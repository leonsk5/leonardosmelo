<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>

    <!-- jsPDF CDN (fix seguro) -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        aside {
            background: #111;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .banner {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .profile-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        section {
            margin-bottom: 20px;
            text-align: left;
        }

        main {
            padding: 20px;
            background: #f5f5f5;
        }

        .card {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input,
        textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        button {
            padding: 10px;
            background: #111;
            color: #fff;
            border: none;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

<body>

    <aside>
        <div class="banner">
            <input id="nome" placeholder="Seu nome">
        </div>

        <div class="profile-container">
            <img id="profileImage" src="https://via.placeholder.com/120">
            <input type="file" id="upload" accept="image/jpeg">
        </div>

        <section>
            <h2>Contato</h2>
            <input id="email" placeholder="Email">
            <input id="linkedin" placeholder="LinkedIn">
            <input id="github" placeholder="GitHub">
        </section>

        <section>
            <h2>Habilidades</h2>
            <textarea id="habilidades"></textarea>

            <h2>Especialidades</h2>
            <textarea id="especialidades"></textarea>
        </section>

        <section>
            <h2>Tecnologias</h2>
            <textarea id="tecnologias"></textarea>
        </section>

    </aside>

    <main>

        <div class="card">
            <h2>Resumo</h2>
            <textarea id="resumo"></textarea>
        </div>

        <div class="card">
            <h2>Portfólio</h2>
            <textarea id="portfolio"></textarea>
        </div>

        <div class="card">
            <h2>Experiência</h2>
            <textarea id="experiencia"></textarea>
        </div>

        <div class="card">
            <h2>Cursos</h2>
            <textarea id="cursos"></textarea>
        </div>

        <button onclick="gerarPDF()">Gerar PDF</button>

    </main>

    <script>
        let jsPDFInstance = null;
        let imagemBase64 = null;

        window.addEventListener('load', () => {
            if (window.jspdf && window.jspdf.jsPDF) {
                jsPDFInstance = window.jspdf.jsPDF;
            } else {
                alert('Erro ao carregar jsPDF. Verifique sua conexão ou CDN.');
            }
        });

        const upload = document.getElementById('upload');
        const profileImage = document.getElementById('profileImage');

        upload.addEventListener('change', function () {
            const file = this.files[0];

            if (file && file.type !== 'image/jpeg') {
                alert('Apenas arquivos JPEG são permitidos.');
                this.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                imagemBase64 = e.target.result;
                profileImage.src = imagemBase64;
            }
            reader.readAsDataURL(file);
        });

        function gerarPDF() {
            if (!jsPDFInstance) {
                alert('jsPDF não carregado corretamente.');
                return;
            }

            const doc = new jsPDFInstance();

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const linkedin = document.getElementById('linkedin').value;
            const github = document.getElementById('github').value;
            const habilidades = document.getElementById('habilidades').value;
            const especialidades = document.getElementById('especialidades').value;
            const tecnologias = document.getElementById('tecnologias').value;
            const resumo = document.getElementById('resumo').value;
            const portfolio = document.getElementById('portfolio').value;
            const experiencia = document.getElementById('experiencia').value;
            const cursos = document.getElementById('cursos').value;

            let y = 10;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(18);
            doc.text(nome || 'Nome não informado', 10, y);

            if (imagemBase64) {
                doc.addImage(imagemBase64, 'JPEG', 150, 10, 40, 40);
            }

            y += 15;

            function addSection(title, content) {
                y += 10;
                doc.setFont('helvetica', 'bold');
                doc.text(title, 10, y);
                y += 5;
                doc.setFont('helvetica', 'normal');

                const splitText = doc.splitTextToSize(content || '-', 180);
                doc.text(splitText, 10, y);
                y += splitText.length * 5;

                if (y > 270) {
                    doc.addPage();
                    y = 10;
                }
            }

            addSection('Contato', `Email: ${email}\nLinkedIn: ${linkedin}\nGitHub: ${github}`);
            addSection('Habilidades', habilidades);
            addSection('Especialidades', especialidades);
            addSection('Tecnologias', tecnologias);
            addSection('Resumo', resumo);
            addSection('Portfólio', portfolio);
            addSection('Experiência', experiencia);
            addSection('Cursos', cursos);

            doc.save('portfolio.pdf');
        }
    </script>

</body>

</html>
